version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: radience
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  web:
    build: .
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/radience?schema=public
    depends_on:
      - db
volumes:
  pgdata:
